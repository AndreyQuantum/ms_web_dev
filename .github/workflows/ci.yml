name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.service }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [products_microservice, orders_microservice]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U ci -d ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci
      TEST_DATABASE_URL: sqlite+aiosqlite:///:memory:
      PRODUCTS_BASE_URL: http://localhost:8002
      ENVIRONMENT: test
      LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install service
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        working-directory: ${{ matrix.service }}
        run: ruff check .
      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: pytest -v --cov=app --cov-report=term-missing
      - name: Run migrations against postgres
        if: matrix.service == 'products_microservice'
        working-directory: ${{ matrix.service }}
        env:
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci
        run: alembic upgrade head
