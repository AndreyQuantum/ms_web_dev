services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app_net
    restart: unless-stopped

  products_service:
    build: ./products_microservice
    environment:
      DATABASE_URL: postgresql+asyncpg://test_user:test_password@postgres:5432/products_db
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net
    restart: unless-stopped

  orders_service:
    build: ./orders_microservice
    environment:
      DATABASE_URL: postgresql+asyncpg://test_user:test_password@postgres:5432/orders_db
      PRODUCTS_BASE_URL: http://products_service:8002
      PRODUCTS_REQUEST_TIMEOUT_S: 2.0
      ENVIRONMENT: development
      LOG_LEVEL: INFO
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      products_service:
        condition: service_started
    networks:
      - app_net
    restart: unless-stopped

volumes:
  pgdata: {}

networks:
  app_net:
    driver: bridge
